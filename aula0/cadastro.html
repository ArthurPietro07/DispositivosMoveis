<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interação com Usuário</title>
</head>

<body>
    <h2> Digite seu nome:</h2>
    <label>Nome: <input type="text" id="nome"></label><br><br>
    <label>Email: <input type="email" id="email"></label><br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <p id="mensagem"></p>

    <script>
        function cadastrar() {
            let nome = document.getElementById("nome").value;
            let email = document.getElementById("email").value;
            
            if(nome !== "" && email !== "") {
                document.getElementById("mensagem").innerText = `Olá, ${nome}! Seu email ${email} foi cadastrado com sucesso.`;
            } else {
                alert("Por favor, preencha ambos os campos para se cadastrar.");
            }
        }
    </script>
</body>

</html>
