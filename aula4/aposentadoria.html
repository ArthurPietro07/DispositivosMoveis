    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let nome = window.prompt("Digite seu nome:");
        let idade = window.prompt("Digite sua idade:");
        let profissao = window.prompt("Digite sua profissão:");
        let aposentadoria = 65 - idade
        if ((idade == 65) || (idade > 65)){
        window.alert("Você esta aposentado");
    } else { window.alert(`${nome} você tem ${idade} anos e é ${profissao} e falta ${aposentadoria} anos para se aposentar.`);}
    </script>
</body>
