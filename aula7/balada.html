<script>
    let idade = Number(prompt("Digite sua idade:"));

    if (isNaN(idade)) {
        alert("Por favor, digite um número válido para a idade.")
    }
    else if (idade >= 18) {
        alert("Vou dar um rolê na balada")
    }
    else if (idade >= 16 && idade < 18) {
        alert("Não tenho idade para ir na balada, mas posso ir no cinema")
    }
    else {
        alert("Vou ficar em casa jogando videogame")
    }
</script>
