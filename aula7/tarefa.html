<script>
    let fezLicao = prompt("Você fez o trabalho de casa? (sim/não)").toLowerCase();
    if (fezLicao === "sim") {
        alert("Parabéns! Você pode assistir TV.")
    }
    else if (fezLicao === "não") {
        alert("Faça o trabalho de casa primeiro!")
    }
    else {
        alert("Você digitou algo inválido")
    }
</script>
