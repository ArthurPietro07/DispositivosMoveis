<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a = parseInt(window.prompt("Digite a variável A: "));
        let b = parseInt(window.prompt("Digite a variável B: "));
        [a, b] = [b, a];
        window.alert(`Valor de A invertido: ${a}. Valor de B invertido: ${b}`);

    </script>
</body>
