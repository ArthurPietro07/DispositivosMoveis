<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num1 = parseInt(window.prompt("Digite um número: "));
        let num2 = parseInt(window.prompt("Digite um número: "));
        let num3 = parseInt(window.prompt("Digite um número: "));

        let maior1 = (num1 > num2 && num1 > num3)
        let maior2 = (num2 > num1 && num2 > num3)
        let maior3 = (num3 > num2 && num3 > num1)

        if (maior1) {
            window.alert("O maior número é o 1");
        }
        if (maior2) {
            window.alert("O maior número é o 2");
        }
        if (maior3) {
            window.alert("O maior número é o 3");
        }



    </script>
